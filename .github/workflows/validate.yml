name: Validate

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*--v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skill-frontmatter:
    name: Skill frontmatter
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Validate skill frontmatter
        run: ruby scripts/validate-skill-frontmatter.rb
